[General]
version=5.11.0
allow_multiple_instances=-1

# ---------------------------------------------------------------------
# USER INTERFACE & WINDOW BEHAVIOR
# ---------------------------------------------------------------------
width=650
minimal_width=500
always_on_top=0
close_with_esc=1
minimal_mode=0
spacious=1
vertical_button_padding=-1
horizontal_button_padding=-1

# ---------------------------------------------------------------------
# PANEL VISIBILITY & TOGGLES
# ---------------------------------------------------------------------
